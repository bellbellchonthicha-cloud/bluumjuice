<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Prompt:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  /* base, sampled from the Bluum menu artwork */
  --cream:#FFFBF3;
  --paper:#FFFFFF;
  --ink:#3A2E22;
  --ink-soft:#8A7B68;
  --brand:#CE6222;        /* wordmark terracotta */
  --brand-dark:#A84E1A;
  --brand-light:#FFE9DD;
  --coral:#E5484D;
  --coral-light:#FFE6E6;
  --edit-bg:#FFF3C7;
  --edit-text:#A85F00;
  --lock-bg:#F4EFE4;
  --lock-text:#8A7B68;
  --line:#F0E6D6;
  --shadow:0 2px 10px rgba(58,46,34,0.06);
  --shadow-lg:0 10px 34px rgba(58,46,34,0.12);
  /* the five Bluum flavor identities, sampled directly from the menu */
  --r-reset:#6C7229;      --r-reset-bg:#C2E1D0;
  --r-glow:#CE6222;       --r-glow-bg:#FFD5C1;
  --r-blush:#FF778E;      --r-blush-bg:#FFDEE0;
  --r-root:#6A6CBF;       --r-root-bg:#D4E3FF;
  --r-tropic:#D9A300;     --r-tropic-bg:#FFF2C1;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--cream);color:var(--ink);font-family:'Noto Sans Thai','IBM Plex Mono',sans-serif;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{font-family:'Prompt','Noto Sans Thai',sans-serif;margin:0;}
.mono{font-family:'IBM Plex Mono',monospace;}
button,input,select{font-family:inherit;}
::-webkit-scrollbar{height:8px;width:8px;}
::-webkit-scrollbar-thumb{background:#D8CFC0;border-radius:8px;}

/* ---------- Header ---------- */
.brand-ribbon{height:7px;display:flex;position:sticky;top:0;z-index:51;}
.brand-ribbon span{flex:1;}
.app-header{position:sticky;top:7px;z-index:50;background:linear-gradient(120deg,var(--r-glow-bg) 0%, var(--r-blush-bg) 38%, var(--r-tropic-bg) 72%, var(--r-reset-bg) 100%);color:var(--ink);padding:18px 24px 0;box-shadow:0 4px 20px rgba(58,46,34,0.10);}
.header-top{display:flex;align-items:center;justify-content:space-between;max-width:1280px;margin:0 auto;flex-wrap:wrap;gap:10px;}
.brand-block{display:flex;align-items:center;gap:12px;}
.brand-mark{width:48px;height:48px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:var(--shadow);}
.brand-name{font-family:'Pacifico',cursive;font-weight:400;font-size:30px;line-height:1;letter-spacing:0.5px;color:var(--brand);text-shadow:-1.5px -1.5px 0 #fff, 1.5px -1.5px 0 #fff, -1.5px 1.5px 0 #fff, 1.5px 1.5px 0 #fff, 0 2px 6px rgba(58,46,34,0.12);}
.brand-sub{font-size:12px;color:var(--ink-soft);margin-top:3px;font-weight:600;}
.header-date{font-family:'IBM Plex Mono',monospace;font-size:13px;background:rgba(255,255,255,0.65);color:var(--ink);padding:8px 14px;border-radius:10px;font-weight:600;}
.tabs{max-width:1280px;margin:14px auto 0;display:flex;gap:4px;overflow-x:auto;padding-bottom:0;}
.tab-btn{flex:none;border:none;background:transparent;color:var(--ink-soft);padding:10px 16px;font-size:14px;font-weight:700;font-family:'Prompt',sans-serif;cursor:pointer;border-radius:10px 10px 0 0;white-space:nowrap;transition:.15s;position:relative;top:1px;}
.tab-btn:hover{color:var(--ink);background:rgba(255,255,255,0.45);}
.tab-btn.active{color:var(--brand-dark);background:var(--cream);}

/* ---------- Layout ---------- */
.wrap{max-width:1280px;margin:0 auto;padding:24px 24px 80px;}
.section-title{font-size:18px;font-weight:700;margin:32px 0 14px;display:flex;align-items:center;gap:8px;}
.section-title:first-child{margin-top:0;}
.section-hint{font-size:12.5px;color:var(--ink-soft);margin:-8px 0 16px;line-height:1.6;}
.grid{display:grid;gap:14px;}
.grid-5{grid-template-columns:repeat(5,1fr);}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
@media(max-width:1000px){.grid-5{grid-template-columns:repeat(2,1fr);}.grid-4{grid-template-columns:repeat(2,1fr);}.grid-3{grid-template-columns:repeat(2,1fr);}}
@media(max-width:640px){.grid-5,.grid-4,.grid-3,.grid-2{grid-template-columns:1fr;}}

.card{background:var(--paper);border-radius:16px;padding:16px 18px;box-shadow:var(--shadow);border:1px solid var(--line);}
.stat-card{display:flex;flex-direction:column;gap:6px;}
.stat-label{font-size:12px;color:var(--ink-soft);font-weight:600;}
.stat-value{font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:600;}
.stat-sub{font-size:11.5px;color:var(--ink-soft);}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;}
.badge-green{background:var(--r-reset-bg);color:var(--r-reset);}
.badge-red{background:var(--coral-light);color:#C43D3D;}
.badge-gray{background:var(--lock-bg);color:var(--lock-text);}

/* editable vs locked convention, matching original spreadsheet */
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:11.5px;color:var(--ink-soft);font-weight:600;}
.field input,.field select{border:none;border-radius:9px;padding:9px 10px;font-size:14px;font-weight:600;}
.editable input,.editable select{background:var(--edit-bg);color:var(--edit-text);border:1px solid #F0DE8A;}
.locked-field{background:var(--lock-bg);color:var(--lock-text);border-radius:9px;padding:9px 10px;font-size:14px;font-weight:600;font-family:'IBM Plex Mono',monospace;}
.legend{display:flex;gap:18px;font-size:12px;color:var(--ink-soft);margin-bottom:14px;flex-wrap:wrap;}
.legend span{display:inline-flex;align-items:center;gap:6px;}
.legend i{width:12px;height:12px;border-radius:4px;display:inline-block;}
.legend .i-edit{background:var(--edit-bg);border:1px solid #F0DE8A;}
.legend .i-lock{background:var(--lock-bg);}

/* tables */
.table-wrap{overflow-x:auto;background:var(--paper);border-radius:16px;box-shadow:var(--shadow);border:1px solid var(--line);}
table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:600px;}
th{text-align:left;padding:10px 12px;background:#FBF8F1;color:var(--ink-soft);font-weight:700;font-size:11.5px;text-transform:uppercase;letter-spacing:0.3px;border-bottom:1px solid var(--line);white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr.total-row td{font-weight:700;background:#FBF8F1;}
tr:hover td{background:#FFFBF0;}
.num{font-family:'IBM Plex Mono',monospace;text-align:right;}
.pill{padding:2px 9px;border-radius:20px;font-size:11.5px;font-weight:700;}

/* forms */
.form-card{background:var(--paper);border-radius:16px;padding:18px;box-shadow:var(--shadow);border:1px solid var(--line);margin-bottom:18px;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;align-items:end;}
.form-grid .field input, .form-grid .field select{background:#FBF8F1;color:var(--ink);border:1px solid var(--line);}
.btn{border:none;border-radius:10px;padding:11px 18px;font-weight:700;font-size:13.5px;cursor:pointer;font-family:'Prompt',sans-serif;transition:.15s;}
.btn-brand{background:var(--brand);color:#fff;}
.btn-brand:hover{background:var(--brand-dark);}
.btn-ghost{background:var(--lock-bg);color:var(--ink);}
.btn-ghost:hover{background:#EAE4D5;}
.btn-danger{background:var(--coral-light);color:#C43D3D;}
.btn-danger:hover{background:#FFDCDC;}
.btn-sm{padding:6px 10px;font-size:12px;border-radius:8px;}
.row-actions{display:flex;gap:6px;}
.empty-state{padding:40px 20px;text-align:center;color:var(--ink-soft);font-size:13.5px;}

/* chart */
.chart-card{background:var(--paper);border-radius:16px;padding:18px 18px 8px;box-shadow:var(--shadow);border:1px solid var(--line);}
.bar-track{fill:#F3F0E9;}
.trend-tooltip{font-family:'IBM Plex Mono',monospace;}

/* menu tag colors — sampled directly from the real bluum menu artwork */
.tag-RESET{background:var(--r-reset-bg);color:var(--r-reset);}
.tag-GLOW{background:var(--r-glow-bg);color:var(--r-glow);}
.tag-BLUSH{background:var(--r-blush-bg);color:#E85C74;}
.tag-ROOT{background:var(--r-root-bg);color:var(--r-root);}
.tag-TROPIC{background:var(--r-tropic-bg);color:var(--r-tropic);}

.menu-block{border-left:4px solid var(--line);padding-left:12px;margin-bottom:18px;background:var(--paper);border-radius:0 14px 14px 0;padding-top:14px;padding-bottom:14px;padding-right:14px;box-shadow:var(--shadow);}
.menu-block.RESET{border-left-color:var(--r-reset);}
.menu-block.GLOW{border-left-color:var(--r-glow);}
.menu-block.BLUSH{border-left-color:var(--r-blush);}
.menu-block.ROOT{border-left-color:var(--r-root);}
.menu-block.TROPIC{border-left-color:var(--r-tropic);}
.ing-row{display:grid;grid-template-columns:1.25fr 0.85fr 0.85fr 0.8fr auto;gap:8px;align-items:start;margin-bottom:6px;padding-top:2px;}
.menu-photo{width:96px;height:96px;border-radius:18px;object-fit:cover;box-shadow:var(--shadow);flex-shrink:0;}
.menu-tagline{font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;display:inline-block;margin-top:4px;}
.ing-row input,.ing-row select{width:100%;padding:7px 8px;border-radius:8px;border:1px solid var(--line);background:#FBF8F1;font-size:13px;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:10px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.25s;z-index:200;}
.toast.show{opacity:1;transform:translate(-50%,-8px);}

.two-col{display:grid;grid-template-columns:1.3fr 1fr;gap:14px;}
@media(max-width:900px){.two-col{grid-template-columns:1fr;}}

.footer-note{margin-top:40px;font-size:11.5px;color:var(--ink-soft);text-align:center;line-height:1.7;}

.login-card{background:var(--paper);border-radius:22px;padding:34px 30px;width:100%;max-width:360px;box-shadow:var(--shadow-lg);text-align:center;position:relative;z-index:2;}
.login-hero{position:absolute;top:0;left:0;right:0;display:flex;justify-content:flex-end;align-items:flex-start;gap:16px;padding:28px 28px 0;z-index:1;pointer-events:none;}
.login-hero-tagline{font-family:'Prompt',sans-serif;font-weight:800;font-size:clamp(15px,2.1vw,24px);line-height:1.35;color:#241a12;text-shadow:0 1px 0 #fff, 0 2px 14px rgba(255,255,255,0.85), 0 -1px 0 #fff;max-width:52%;}
.login-hero-brand{text-align:right;flex-shrink:0;}
.login-hero-brand-name{font-family:'Pacifico',cursive;font-size:clamp(30px,4.4vw,46px);line-height:1;color:var(--brand);text-shadow:-2px -2px 0 #fff,2px -2px 0 #fff,-2px 2px 0 #fff,2px 2px 0 #fff,0 4px 16px rgba(58,46,34,0.25);}
.login-hero-brand-name .dot{color:var(--brand);}
.login-hero-brand-sub{font-family:'Pacifico',cursive;font-size:clamp(15px,2vw,20px);color:var(--brand);margin-top:-6px;text-shadow:-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff,1px 1px 0 #fff;}
@media(max-width:640px){.login-hero{padding:18px 18px 0;}.login-hero-tagline{max-width:56%;}}
.login-logo-wrap{display:flex;justify-content:center;margin-bottom:10px;}
.login-logo{width:96px;height:96px;border-radius:50%;object-fit:cover;box-shadow:var(--shadow);}
.login-title{font-family:'Prompt',sans-serif;font-weight:700;font-size:17px;color:var(--ink);margin-bottom:4px;}
.login-sub{font-size:12.5px;color:var(--ink-soft);margin-bottom:20px;text-align:center;}
.login-card .field{text-align:left;}
.login-card .field label{font-weight:700;margin-bottom:5px;display:block;}
.login-card input{width:100%;}
.login-link{font-size:12.5px;color:var(--brand);font-weight:700;text-decoration:none;}
.login-link:hover{text-decoration:underline;}
.login-error{background:var(--coral-light);color:#C43D3D;font-size:12.5px;font-weight:600;padding:9px 12px;border-radius:9px;margin-bottom:14px;text-align:left;}
.modal-overlay{position:fixed;inset:0;z-index:310;display:flex;align-items:center;justify-content:center;background:rgba(58,46,34,0.45);padding:20px;}
.modal-card{background:var(--paper);border-radius:20px;padding:28px 26px;width:100%;max-width:360px;box-shadow:var(--shadow-lg);}
.modal-card-lg{max-width:640px;max-height:88vh;overflow-y:auto;text-align:left;}
.modal-card .field{text-align:left;}
.modal-card .field label{font-weight:700;margin-bottom:5px;display:block;}
.modal-card input{width:100%;}
.forgot-success{background:var(--r-reset-bg);color:var(--r-reset);font-size:12.5px;font-weight:600;padding:9px 12px;border-radius:9px;margin-bottom:14px;}
.forgot-fail{background:var(--coral-light);color:#C43D3D;font-size:12.5px;font-weight:600;padding:9px 12px;border-radius:9px;margin-bottom:14px;}
.session-badge{font-size:11.5px;font-weight:600;background:rgba(255,255,255,0.65);color:var(--ink);padding:8px 12px;border-radius:10px;font-family:'IBM Plex Mono',monospace;}
</style>
</head>

      <div class="login-hero-brand-sub">juice</div>
    </div>
  </div>

   SUPABASE CONNECTION
   เชื่อมต่อฐานข้อมูลจริง แทนที่ window.storage เดิม
   (window.storage ใช้ได้แค่ตอนรันใน Claude.ai เท่านั้น)
   ========================================================= */
const SUPABASE_URL = "https://xcnxtopqwuwwcpkczmys.supabase.co";
const SUPABASE_KEY = "sb_publishable_nk7y4hIX07Ulm6SLaKXOGQ_WDiVeJwu";
const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// shim ที่ทำหน้าตาเหมือน window.storage เดิมทุกประการ
// แต่ข้างในไปอ่าน/เขียนที่ตาราง app_storage ใน Supabase จริง
window.storage = {
  async get(key, shared=false){
    const { data, error } = await _sb.from('app_storage').select('value').eq('key', key).maybeSingle();
    if(error || !data) throw new Error('key not found: ' + key);
    return { key, value: data.value, shared };
  },
  async set(key, value, shared=false){
    const { error } = await _sb.from('app_storage').upsert({ key, value, updated_at: new Date().toISOString() });
    if(error){ console.error('supabase set error', error); return null; }
    return { key, value, shared };
  },
  async delete(key, shared=false){
    const { error } = await _sb.from('app_storage').delete().eq('key', key);
    if(error){ console.error('supabase delete error', error); return null; }
    return { key, deleted:true, shared };
  },
  async list(prefix='', shared=false){
    let q = _sb.from('app_storage').select('key');
    if(prefix) q = q.like('key', prefix + '%');
    const { data, error } = await q;
    if(error){ console.error('supabase list error', error); return null; }
    return { keys: (data||[]).map(d=>d.key), prefix, shared };
  }
};

/* ---------- utils ---------- */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function pad(n){ return String(n).padStart(2,'0'); }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function shiftDate(str, days){ const [y,m,d]=str.split('-').map(Number); const dt=new Date(y,m-1,d); dt.setDate(dt.getDate()+days); return dt.getFullYear()+'-'+pad(dt.getMonth()+1)+'-'+pad(dt.getDate()); }
function daysBetween(a,b){ const [ay,am,ad]=a.split('-').map(Number); const [by,bm,bd]=b.split('-').map(Number); const da=new Date(ay,am-1,ad), db=new Date(by,bm-1,bd); return Math.round((db-da)/86400000); }
function daysInMonth(y,m){ return new Date(y,m,0).getDate(); }
function fmtDateTH(str){ if(!str) return '-'; const [y,m,d]=str.split('-'); return `${d}/${m}/${y}`; }
function fmtMoney(n){ n = Number(n)||0; return n.toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtInt(n){ n = Math.round(Number(n)||0); return n.toLocaleString('th-TH'); }
function fmtPct(n){ return (Number(n)*100).toLocaleString('th-TH',{maximumFractionDigits:1}) + '%'; }
function monthKey(dateStr){ return dateStr.slice(0,7); }
function thMonthLabel(mk){
  const names=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const [y,m]=mk.split('-').map(Number);
  return `${names[m-1]} ${y}`;
}
/* ---------- ช่องกรอกวันที่ รวมช่องเดียว รูปแบบ วว/ดด/ปปปป (วันขึ้นก่อนเดือนเสมอ ไม่พึ่ง locale เบราว์เซอร์) + ปุ่มปฏิทินช่วยเลือกวัน ----------
   หมายเหตุ: ปุ่ม 📅 เป็นแค่ไอคอนตกแต่ง (pointer-events:none) ส่วน input[type=date] จริงวางทับอยู่บนปุ่มแบบโปร่งใส

function dateFieldHTML(idPrefix, isoValue){
  const safeIso = /^\d{4}-\d{2}-\d{2}$/.test(isoValue||'') ? isoValue : todayStr();
  return `
  <div style="display:flex;gap:6px;align-items:center;">
    <input type="text" inputmode="numeric" class="mono" id="${idPrefix}" data-date-field="1" value="${fmtDateTH(safeIso)}" placeholder="วว/ดด/ปปปป" maxlength="10" style="flex:1;min-width:0;">
    <div style="position:relative;flex:none;width:38px;height:38px;">
      <button type="button" tabindex="-1" title="เลือกวันที่จากปฏิทิน" style="position:absolute;inset:0;pointer-events:none;border:1px solid var(--line);background:var(--paper);border-radius:8px;font-size:15px;display:flex;align-items:center;justify-content:center;">📅</button>
      <input type="date" id="${idPrefix}-picker" data-date-picker="${idPrefix}" value="${safeIso}" style="position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;">
    </div>
  </div>`;
}
function readDateField(idPrefix){
  const raw = (document.getElementById(idPrefix).value||'').trim();
  const m = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(!m) return '';
  const d = pad(parseInt(m[1])), mo = pad(parseInt(m[2])), y = m[3];
  return `${y}-${mo}-${d}`;
}
function ingredientPrice(name){ const i = state.ingredients.find(x=>x.name===name); return i? Number(i.price):0; }
function gramsForQty(ingredientName, qty){
  const ing = state.ingredients.find(x=>x.name===ingredientName);
  if(!ing) return null;
  if(/กรัม|กก\.|g\b|kg\b/i.test(ing.unit||'')) return null; // หน่วยเป็นน้ำหนักอยู่แล้ว ไม่ต้องแปลงซ้ำ
  const grams = Number(qty) * Number(ing.weight||0) * 1000;
  if(!isFinite(grams)) return null;
  return Math.round(grams);
}

/* ---------- ล็อคสูตรตามคัมภีร์น้ำสกัดเย็นหน้าร้าน (PDF) ----------
   แนวคิด: แยก "ราคาซื้อวัตถุดิบ" ออกจาก "สูตร" กันคนละส่วนชัดเจน
   - ราคาวัตถุดิบ: กรอกตามหน่วยที่ซื้อจริง (เช่น 12 บาท/ลูก) — หน่วยจะเป็นอะไรก็ได้ ไม่ต้องคิดเป็นกรัมเอง
   - สูตร: ล็อคเป็น "กรัมต่อขวด" ตายตัวตาม PDF เสมอ ไม่ขึ้นกับหน่วยซื้อหรือราคาที่แก้ภายหลัง
   ระบบจะแปลงกรัมในสูตร → จำนวนที่ต้องซื้อ (ลูก/หัว) และต้นทุน (บาท) ให้อัตโนมัติ
   โดยใช้ "น้ำหนัก/หน่วย (กก.)" ของวัตถุดิบแต่ละชนิดเป็นตัวแปลง */
const LOCKED_RECIPE_GRAMS = {
  RESET:  [{name:'แอปเปิ้ลเขียว', g:180},{name:'แตงกวา', g:180},{name:'เลมอน', g:25},{name:'ขิง', g:10}],
  GLOW:   [{name:'ส้ม', g:260},{name:'แครอท', g:130},{name:'ขิง', g:10}],
  BLUSH:  [{name:'แตงโม', g:320},{name:'แอปเปิ้ลแดง', g:160},{name:'เลมอน', g:20}],
  ROOT:   [{name:'บีทรูด', g:120},{name:'แอปเปิ้ลแดง', g:180},{name:'แครอท', g:130}],
  TROPIC: [{name:'สับปะรด', g:250},{name:'ส้ม', g:170},{name:'เลมอน', g:25}],
};
// น้ำหนัก/หน่วย เริ่มต้น ใช้แปลงกรัม <-> หน่วยซื้อจริง (ปรับได้ทีหลังถ้าขนาดผลไม้ที่ซื้อไม่เท่านี้ — ไม่กระทบปริมาณสูตร)
const DEFAULT_PURCHASE_UNIT = {
  'แอปเปิ้ลเขียว':{unit:'ลูก', price:12, weight:0.15},
  'แอปเปิ้ลแดง':{unit:'ลูก', price:10, weight:0.15},
  'ส้ม':{unit:'ลูก', price:8, weight:0.20},
  'แตงกวา':{unit:'ลูก', price:5, weight:0.15},
  'แครอท':{unit:'หัว', price:5, weight:0.10},
  'บีทรูด':{unit:'หัว', price:15, weight:0.15},
  'สับปะรด':{unit:'ลูก', price:25, weight:1.20},
  'แตงโม':{unit:'ลูกใหญ่ (5-6 กก.)', price:60, weight:5.50},
  'เลมอน':{unit:'ลูก', price:8, weight:0.08},
  'ขิง':{unit:'กรัม', price:0.5, weight:0.001},
};
function lockRecipesToPosterStandard(){
  let changed = false;
  // คืนหน่วยซื้อของวัตถุดิบหลักให้เป็นหน่วยที่ซื้อจริง (เผื่อเคยถูกแปลงเป็น "กรัม" ไปจากเวอร์ชันก่อนหน้า)
  state.ingredients.forEach(ing=>{
    const std = DEFAULT_PURCHASE_UNIT[ing.name];
    if(std && ing.unit==='กรัม' && std.unit!=='กรัม'){
      ing.unit = std.unit; ing.price = std.price; ing.weight = std.weight;
      changed = true;
    }
  });
  // บังคับปริมาณสูตร 5 เมนูหลักให้ตรงกับ PDF (กรัมต่อขวด x10 = ต่อรอบผลิต) — ค่านี้ไม่ผูกกับหน่วยซื้อ
  Object.keys(LOCKED_RECIPE_GRAMS).forEach(key=>{
    const r = state.recipes.find(x=>x.key===key);
    if(!r) return;
    const target = LOCKED_RECIPE_GRAMS[key].map(t=>({name:t.name, qty:t.g*10}));
    const same = r.ingredients.length===target.length &&
      r.ingredients.every((ing,i)=> ing.name===target[i].name && Number(ing.qty)===target[i].qty);
    if(!same){ r.ingredients = target; changed = true; }
  });
  return changed;
}
// ราคาต่อกรัม แปลงจาก "ราคา/หน่วยซื้อจริง" ÷ "น้ำหนัก/หน่วย(กก.)×1000" — ใช้คำนวณต้นทุนสูตร (ซึ่งเก็บเป็นกรัมเสมอ)
function ingredientPricePerGram(name){
  const ing = state.ingredients.find(x=>x.name===name);
  if(!ing) return 0;
  const gramsPerUnit = Number(ing.weight||0)*1000;
  if(!gramsPerUnit) return 0;
  return Number(ing.price||0)/gramsPerUnit;
}
function showToast(msg){

  clearTimeout(showToast._t); showToast._t=setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ---------- storage ---------- */
async function loadState(){
  const keys = ['settings','ingredients','recipes','channels','salesLog','expenseLog','purchaseLog','productionLog'];
  const defaults = {
    settings: defaultSettings(), ingredients: defaultIngredients(), recipes: defaultRecipes(),
    channels: [...DEFAULT_CHANNELS],
    salesLog: defaultSalesLog(), expenseLog: defaultExpenseLog(), purchaseLog: defaultPurchaseLog(),
    productionLog: defaultProductionLog()
  };
  for(const k of keys){
    try{
      const res = await window.storage.get(k, false);
      state[k] = res && res.value ? JSON.parse(res.value) : defaults[k];
    }catch(e){
      state[k] = defaults[k];
    }
  }
  // migration: เติม label/emoji/tagline/image ให้สูตรที่บันทึกไว้ก่อนหน้านี้ (ยังไม่มีฟิลด์เหล่านี้)
  state.recipes = (state.recipes||[]).map(r=>({
    key: r.key,
    label: r.label || (LEGACY_MENU_META[r.key]||{}).label || r.key,
    emoji: r.emoji || (LEGACY_MENU_META[r.key]||{}).emoji || '🍹',
    tagline: r.tagline!==undefined ? r.tagline : (MENU_TAGLINES[r.key]||''),
    image: r.image || MENU_IMAGES[r.key] || '',
    shelfLifeDays: r.shelfLifeDays || 3,
    ingredients: r.ingredients || []
  }));
  // migration: แปลงช่องทางจาก string เดิม เป็น object {name, priceType, commission} เพื่อให้ตั้งค่าคอมแยกต่อช่องทางได้
  const LEGACY_COMMISSION_KEY = {'LINE MAN':'commissionLineMan', 'Grab':'commissionGrab', 'ShopeeFood':'commissionShopee'};
  let channelsMigrated = false;
  state.channels = (state.channels||[]).map(c=>{
    if(typeof c === 'string'){
      channelsMigrated = true;
      const commKey = LEGACY_COMMISSION_KEY[c];
      return {
        name: c,
        priceType: c==='LINE OA' ? 'lineoa' : 'other',
        commission: commKey ? Number(state.settings[commKey]||0) : 0
      };
    }
    return c;
  });
  if(!state.channels.length){ state.channels = DEFAULT_CHANNELS.map(c=>({...c})); channelsMigrated = true; }
  if(channelsMigrated) await persist('channels');
  // ล็อคสูตรให้ตรงกับ PDF ครั้งเดียว + คืนหน่วยซื้อวัตถุดิบให้เป็นหน่วยที่ซื้อจริง (V2 = เวอร์ชันที่แยกราคาซื้อออกจากสูตร)
  if(!state.settings.recipeLockedToPosterV2){
    const changed = lockRecipesToPosterStandard();
    state.settings.recipeLockedToPosterV2 = true;
    if(changed){ await persist('ingredients'); await persist('recipes'); }
    await persist('settings');
  }
}
async function persist(key){
  try{ await window.storage.set(key, JSON.stringify(state[key]), false); }
  catch(e){ console.error('storage save failed', key, e); showToast('บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง'); }
}

/* =========================================================
   CALCULATIONS
   ========================================================= */
function materialCostPerBottleAvg(){
  const totalCost = state.recipes.reduce((s,r)=> s + recipeBatchCost(r.key), 0);
  const totalBottles = state.recipes.length * 10;
  return totalBottles? totalCost/totalBottles : 0;
}
function recipeBatchCost(menuKey){
  const r = state.recipes.find(x=>x.key===menuKey);
  if(!r) return 0;
  return r.ingredients.reduce((s,ing)=> s + Number(ing.qty)*ingredientPricePerGram(ing.name), 0);
}
function recipeCostPerBottle(menuKey){ return recipeBatchCost(menuKey)/10; }
function totalCostPerBottle(){
  return materialCostPerBottleAvg() + Number(state.settings.packagingCost) + Number(state.settings.shippingCost);
}
function marginLineOA(){ return state.settings.priceLineOA - totalCostPerBottle(); }
function findChannel(name){ return (state.channels||[]).find(c=>c.name===name) || null; }
function channelCommission(ch){
  const c = findChannel(ch);
  return c ? Number(c.commission)||0 : 0;
}
function channelBasePrice(ch){
  if(!ch) return Number(state.settings.priceOther);
  if(ch.priceType==='lineoa') return Number(state.settings.priceLineOA);
  if(ch.priceType==='custom') return Number(ch.customPrice)||0;
  return Number(state.settings.priceOther);
}
function channelPrice(ch){
  return channelBasePrice(findChannel(ch));
}
function saleRevenue(row){
  const price = channelPrice(row.channel);
  return row.bottles*price*(1-channelCommission(row.channel));
}
function saleCost(row){ return row.bottles*totalCostPerBottle(); }
function saleProfit(row){ return saleRevenue(row)-saleCost(row); }

function todaysSales(){ return state.salesLog.filter(r=>r.date===todayStr()); }
function salesOnDate(d){ return state.salesLog.filter(r=>r.date===d); }

function channelSummary(rows){
  const out = {};
  state.channels.forEach(c=> out[c.name] = {bottles:0, revenue:0, profit:0});
  rows.forEach(r=>{
    if(!out[r.channel]) out[r.channel] = {bottles:0, revenue:0, profit:0};
    out[r.channel].bottles += Number(r.bottles);
    out[r.channel].revenue += saleRevenue(r);
    out[r.channel].profit += saleProfit(r);
  });
  const total = {bottles:0, revenue:0, profit:0};
  Object.values(out).forEach(v=>{ total.bottles+=v.bottles; total.revenue+=v.revenue; total.profit+=v.profit; });
  return {byChannel: out, total};
}

function monthlyAgg(mk){
  const rows = state.salesLog.filter(r=> monthKey(r.date)===mk);
  const bottles = rows.reduce((s,r)=>s+Number(r.bottles),0);
  const revenue = rows.reduce((s,r)=>s+saleRevenue(r),0);
  const profit = rows.reduce((s,r)=>s+saleProfit(r),0);
  const [y,m] = mk.split('-').map(Number);
  const now = new Date();
  const isCurrent = (y===now.getFullYear() && m===(now.getMonth()+1));
  const divisor = isCurrent ? now.getDate() : daysInMonth(y,m);
  const avgPerDay = divisor? bottles/divisor : 0;
  return {bottles, revenue, profit, avgPerDay};
}

function purchasedOn(d, ingredientName){
  return state.purchaseLog.filter(r=>r.date===d && r.ingredient===ingredientName)
    .reduce((s,r)=>s+Number(r.qty),0);
}
function ingredientRequiredForBatch(name){
  let total = 0;
  state.recipes.forEach(r=>{
    r.ingredients.forEach(ing=>{ if(ing.name===name) total += Number(ing.qty); });
  });
  return total;
}

function wasteSummary(){
  const today = todayStr();
  let wasteBottles = 0, wasteValue = 0;
  const soldByMenu = {}; MENUS().forEach(m=>soldByMenu[m.key]=0);
  let pendingWaste = false;
  state.productionLog.forEach(row=>{
    MENUS().forEach(m=>{
      const cell = row.menus && row.menus[m.key];
      if(!cell) return;
      const produced = Number(cell.produced)||0;
      const sold = Number(cell.sold)||0;
      soldByMenu[m.key] += sold;
      const leftover = produced - sold;
      if(leftover>0){
        const recipe = state.recipes.find(x=>x.key===m.key);
        const shelf = recipe? Number(recipe.shelfLifeDays) : 3;
        const age = daysBetween(row.date, today);
        if(age > shelf){
          wasteBottles += leftover;
          wasteValue += leftover * recipeCostPerBottle(m.key);
        } else if(age >= 0){
          pendingWaste = true;
        }
      }
    });
  });
  let bestMenu = null, bestSold = -1;
  MENUS().forEach(m=>{ if(soldByMenu[m.key]>bestSold){ bestSold=soldByMenu[m.key]; bestMenu=m; } });
  const productionDaysThisMonth = new Set(
    state.productionLog.filter(r=>monthKey(r.date)===monthKey(today)).map(r=>r.date)
  ).size;
  return {wasteBottles, wasteValue, soldByMenu, bestMenu, bestSold, pendingWaste, productionDaysThisMonth};
}

function cashflowSummary(){
  const mk = monthKey(todayStr());
  const inflow = state.salesLog.filter(r=>monthKey(r.date)===mk).reduce((s,r)=>s+saleRevenue(r),0);
  const outflow = state.expenseLog.filter(r=>monthKey(r.date)===mk).reduce((s,r)=>s+Number(r.amount),0);
  const allInflow = state.salesLog.reduce((s,r)=>s+saleRevenue(r),0);
  const allOutflow = state.expenseLog.reduce((s,r)=>s+Number(r.amount),0);
  const expenseCount = state.expenseLog.filter(r=>monthKey(r.date)===mk).length;
  return {inflow, outflow, net: inflow-outflow, cumulative: allInflow-allOutflow, expenseCount};
}

function last7DaysTrend(){
  const days = [];
  for(let i=6;i>=0;i--){
    const d = shiftDate(todayStr(), -i);
    const bottles = salesOnDate(d).reduce((s,r)=>s+Number(r.bottles),0);
    days.push({date:d, bottles});
  }
  return days;
}

function renderDashboard(){
  const s = state.settings;
  const totalCost = totalCostPerBottle();
  const margin = marginLineOA();
  const costStatus = totalCost <= Number(s.targetMaxCost);
  const marginAtTarget = s.priceLineOA? (s.priceLineOA - Number(s.targetMaxCost)) / s.priceLineOA : 0;

  const today = todayStr();
  const todayRows = todaysSales();
  const todayBottles = todayRows.reduce((a,r)=>a+Number(r.bottles),0);
  const todayRevenue = todayRows.reduce((a,r)=>a+saleRevenue(r),0);
  const todayCost = todayRows.reduce((a,r)=>a+saleCost(r),0);
  const todayProfit = todayRows.reduce((a,r)=>a+saleProfit(r),0);
  const pctOfTarget = s.targetBottlesPerDay? todayBottles/Number(s.targetBottlesPerDay) : 0;

  const chSum = channelSummary(todayRows);
  let bestCh=null,bestProfit=-Infinity;
  Object.entries(chSum.byChannel).forEach(([ch,v])=>{ if(v.profit>bestProfit){bestProfit=v.profit;bestCh=ch;} });

  const yRows = salesOnDate(yesterday);
  const yBottles = yRows.reduce((a,r)=>a+Number(r.bottles),0);
  const yProfit = yRows.reduce((a,r)=>a+saleProfit(r),0);
  const bottlesDelta = yBottles>0 ? ((todayBottles-yBottles)/yBottles) : null;
  const profitDelta = yBottles>0 ? ((todayProfit-yProfit)/Math.abs(yProfit||1)) : null;

  const now = new Date();
  const curMK = monthKey(today);
  const prevDate = new Date(now.getFullYear(), now.getMonth()-1, 1);
  const prevMK = prevDate.getFullYear()+'-'+pad(prevDate.getMonth()+1);
  const curM = monthlyAgg(curMK), prevM = monthlyAgg(prevMK);
  const salesMoM = prevM.bottles>0 ? ((curM.bottles-prevM.bottles)/prevM.bottles) : null;
  const profitMoM = prevM.profit>0 ? ((curM.profit-prevM.profit)/prevM.profit) : null;

  const otherPrice = Number(s.priceOther);
  const otherChannels = state.channels.filter(c=>c.priceType==='other');
  const avgOtherComm = otherChannels.length ? otherChannels.reduce((sum,c)=>sum+Number(c.commission||0),0)/otherChannels.length : 0;
  const otherProfitPerBottle = otherPrice*(1-avgOtherComm) - totalCost;
  const otherMarginPct = otherPrice? otherProfitPerBottle/otherPrice : 0;
  const marginLineOAPct = s.priceLineOA? margin/s.priceLineOA : 0;

  const monthlyProfit = curM.profit;
  const pctGoal = s.monthlyProfitTarget? monthlyProfit/Number(s.monthlyProfitTarget) : 0;
  const remaining = Math.max(0, Number(s.monthlyProfitTarget) - monthlyProfit);
  const daysInCurMonth = daysInMonth(now.getFullYear(), now.getMonth()+1);
  const daysRemaining = Math.max(1, daysInCurMonth - now.getDate() + 1);
  const bottlesNeededPerDay = margin>0 ? Math.ceil(remaining/margin/daysRemaining) : 0;

  const breakeven = margin>0 ? Math.ceil(Number(s.fixedCostPerDay)/margin) : 0;
  const stock = Number(s.currentStock);
  const stockOK = stock > Number(s.reorderPoint);
  const suggestOrder = Math.max(0, Number(s.targetBottlesPerDay)*Number(s.safetyStockDays) - stock);

  // last 3 days vs target streak
  let belowStreak = 0;
  for(let i=0;i<3;i++){
    const d = shiftDate(today,-i);
    const b = salesOnDate(d).reduce((s2,r)=>s2+Number(r.bottles),0);
    if(b < Number(s.targetBottlesPerDay)) belowStreak++; else break;
  }

  const trend = last7DaysTrend();
  const maxTrend = Math.max(1, ...trend.map(t=>t.bottles));

  const waste = wasteSummary();
  const cash = cashflowSummary();

function settingsField(key,label,type,val,step){
  return `<div class="field editable"><label>${label}</label><input data-setting="${key}" type="${type}" step="${step||'any'}" value="${val}"></div>`;
}
function lockedField(label,val){
  return `<div class="field"><label>${label}</label><div class="locked-field">🔒 ${val}</div></div>`;
}
function sparkBarChart(data,max){
  const w=900,h=180,pad=30,barGap=14;
  const barW = (w-pad*2-barGap*(data.length-1))/data.length;
  let bars='';
  data.forEach((d,i)=>{
    const x = pad + i*(barW+barGap);
    const bh = max? (d.bottles/max)*(h-60) : 0;
    const y = h-40-bh;
    const isToday = d.date===todayStr();
    bars += `<rect class="bar-track" x="${x}" y="10" width="${barW}" height="${h-50}" rx="6"></rect>
      <rect x="${x}" y="${y}" width="${barW}" height="${bh}" rx="6" fill="${isToday?'#CE6222':'#FFD5C1'}"></rect>
      <text x="${x+barW/2}" y="${y-8}" text-anchor="middle" font-size="12" font-weight="700" fill="#2B2420" font-family="IBM Plex Mono, monospace">${d.bottles}</text>
      <text x="${x+barW/2}" y="${h-20}" text-anchor="middle" font-size="11" fill="#6B6259">${d.date.slice(5).replace('-','/')}</text>`;
  });
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;display:block;">${bars}</svg>`;
}

let recipeModalState = null;
function slugifyRecipeKey(label){
  let key = (label||'').trim().toUpperCase().replace(/[^A-Z0-9ก-๙]+/g,'_').replace(/^_+|_+$/g,'');
  if(!key) key = 'MENU';
  let finalKey = key, n = 1;
  while(state.recipes.some(r=>r.key===finalKey)){ finalKey = key + '_' + (n++); }
  return finalKey;
}
function blankIngredientRow(){
  return { name: state.ingredients[0] ? state.ingredients[0].name : '', qty: 0 };
}
function openRecipeModal(key){
  const existing = key ? state.recipes.find(r=>r.key===key) : null;
  recipeModalState = {
    editKey: key || null,
    label: existing ? existing.label : '',
    emoji: existing ? existing.emoji : '🍹',
    tagline: existing ? existing.tagline : '',
    shelfLifeDays: existing ? existing.shelfLifeDays : 3,
    image: existing ? existing.image : '',
    ingredients: existing ? existing.ingredients.map(i=>({...i})) : [blankIngredientRow()]
  };
  renderRecipeModal();
  document.getElementById('recipeModal').style.display = 'flex';
}
function closeRecipeModal(){
  document.getElementById('recipeModal').style.display = 'none';
  recipeModalState = null;
}
function renderRecipeModal(){
  const s = recipeModalState;
  if(!s) return;
  const card = document.getElementById('recipeModalCard');
  card.innerHTML = `
    <div class="login-title" style="font-size:18px;">${s.editKey ? '✏️ แก้ไขสูตร' : '+ เพิ่มสูตรใหม่'}</div>

      <div style="text-align:center;">

          : `<div id="rf-image-preview-empty" style="width:88px;height:88px;border-radius:14px;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:var(--shadow);">${s.emoji||'🍹'}</div>`}
        <div style="margin-top:6px;"><input type="file" accept="image/*" id="rf-image-input" style="font-size:11px;max-width:110px;"></div>
      </div>
      <div style="flex:1;min-width:220px;display:flex;flex-direction:column;gap:8px;">
        <div class="field"><label>ชื่อสูตร</label><input type="text" id="rf-label" value="${s.label}" placeholder="เช่น DETOX"></div>
        <div style="display:flex;gap:8px;">
          <div class="field" style="width:80px;"><label>อิโมจิ</label><input type="text" id="rf-emoji" value="${s.emoji}" maxlength="4"></div>
          <div class="field" style="flex:1;"><label>อายุการเก็บรักษา (วัน)</label><input type="number" min="1" id="rf-shelf" value="${s.shelfLifeDays}"></div>
        </div>
      </div>
    </div>
    <div class="field" style="margin-top:10px;"><label>จุดเด่นของสูตร</label><input type="text" id="rf-tagline" value="${s.tagline}" placeholder="เช่น สดชื่น เผาผลาญไขมัน"></div>

    <div style="margin-top:16px;font-weight:700;font-size:13px;">วัตถุดิบ (ระบุปริมาณเป็นกรัม ต่อ 1 ขวด)</div>
    <div class="section-hint" style="margin-top:2px;">ถ้ายังไม่มีผลไม้/วัตถุดิบที่ต้องการในลิสต์ เลือก "+ วัตถุดิบใหม่..." แล้วพิมพ์ชื่อได้เลย ระบบจะเพิ่มเข้าไปในตาราง "ราคาวัตถุดิบต่อหน่วย" ด้านบนให้อัตโนมัติ (ไปตั้งราคา/หน่วย/น้ำหนักของมันได้ทีหลัง)</div>

          <select data-rf-ing-select="${i}" style="flex:1.3;min-width:140px;">
            ${state.ingredients.map(gi=>`<option value="${gi.name}" ${gi.name===ing.name?'selected':''}>${gi.name}</option>`).join('')}
            <option value="__NEW__" ${ing.name==='__NEW__'?'selected':''}>+ วัตถุดิบใหม่...</option>

    <div style="display:flex;gap:8px;margin-top:22px;flex-wrap:wrap;">
      <button class="btn btn-brand" id="rf-save" style="flex:1;">💾 บันทึกสูตร</button>
      <button class="btn btn-ghost" id="rf-cancel">ยกเลิก</button>
      ${s.editKey ? `<button class="btn btn-danger" id="rf-delete">ลบสูตรนี้</button>` : ''}
    </div>
    ${s.editKey && s._confirmingDelete ? `
    <div style="margin-top:12px;padding:12px;background:var(--coral-light);border:1px solid var(--coral);border-radius:10px;">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px;">⚠️ ต้องการลบสูตรนี้ใช่หรือไม่? ประวัติยอดผลิต/ยอดขายเดิมของเมนูนี้จะยังอยู่ในรายงานเก่า</div>
      <div style="display:flex;gap:8px;">
        <button type="button" class="btn btn-danger btn-sm" id="rf-delete-confirm">ยืนยัน ลบสูตรนี้</button>
        <button type="button" class="btn btn-ghost btn-sm" id="rf-delete-cancel">ยกเลิก</button>
      </div>

  document.querySelectorAll('#rf-ing-list [data-rf-ing-del]').forEach(b=>{
    b.addEventListener('click', ()=>{
      const idx = parseInt(b.dataset.rfIngDel);
      recipeModalState.ingredients.splice(idx,1);
      if(recipeModalState.ingredients.length===0) recipeModalState.ingredients.push(blankIngredientRow());
      renderRecipeModal();
    });
  });
  document.querySelectorAll('#rf-ing-list [data-rf-ing-select]').forEach(sel=>{
    sel.addEventListener('change', ()=>{
      const idx = parseInt(sel.dataset.rfIngSelect);
      recipeModalState.ingredients[idx].name = sel.value;
      if(sel.value!=='__NEW__') delete recipeModalState.ingredients[idx]._newName;
      renderRecipeModal(); // re-render เพื่อโชว์/ซ่อนช่องกรอกชื่อวัตถุดิบใหม่
    });
  });
  document.querySelectorAll('#rf-ing-list [data-rf-ing-idx]').forEach(inp=>{
    inp.addEventListener('change', ()=>{
      const idx = parseInt(inp.dataset.rfIngIdx);
      const field = inp.dataset.rfIngField;
      if(field==='qty'){ recipeModalState.ingredients[idx].qty = (parseFloat(inp.value)||0)*10; }
      else if(field==='newname'){ recipeModalState.ingredients[idx]._newName = inp.value; }
    });
  });
  document.getElementById('rf-save').addEventListener('click', saveRecipeModal);
  document.getElementById('rf-cancel').addEventListener('click', closeRecipeModal);
  if(s.editKey){
    document.getElementById('rf-delete').addEventListener('click', ()=>{
      recipeModalState._confirmingDelete = true;
      renderRecipeModal();
    });
  }
  const delConfirmBtn = document.getElementById('rf-delete-confirm');
  if(delConfirmBtn) delConfirmBtn.addEventListener('click', deleteRecipeFromModal);
  const delCancelBtn = document.getElementById('rf-delete-cancel');
  if(delCancelBtn) delCancelBtn.addEventListener('click', ()=>{
    recipeModalState._confirmingDelete = false;
    renderRecipeModal();
  });
}
function handleRecipeImageChange(e){
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){
      const maxW = 420;
      const scale = Math.min(1, maxW/img.width);
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width*scale);
      canvas.height = Math.round(img.height*scale);
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
      recipeModalState.image = dataUrl;
      renderRecipeModal();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}
async function saveRecipeModal(){
  const s = recipeModalState;
  const label = (document.getElementById('rf-label').value||'').trim();
  if(!label){ showToast('กรุณากรอกชื่อสูตร'); return; }
  const emoji = document.getElementById('rf-emoji').value.trim() || '🍹';
  const tagline = document.getElementById('rf-tagline').value.trim();
  const shelfLifeDays = parseFloat(document.getElementById('rf-shelf').value)||3;

  // แปลงแถวที่เลือก "+ วัตถุดิบใหม่..." ให้เป็นชื่อจริง แล้วเพิ่มเข้าตาราง "ราคาวัตถุดิบต่อหน่วย" ด้านบนให้อัตโนมัติ
  let addedNewIngredient = false;
  const resolved = s.ingredients.map(ing=>{
    if(ing.name==='__NEW__'){
      const newName = (ing._newName||'').trim();
      if(!newName) return null;
      const exists = state.ingredients.find(x=>x.name.toLowerCase()===newName.toLowerCase());
      if(!exists){
        state.ingredients.push({name:newName, unit:'กรัม', price:0, weight:0.001});
        addedNewIngredient = true;
      }
      return {name: exists ? exists.name : newName, qty: ing.qty};
    }
    return {name: ing.name, qty: ing.qty};
  }).filter(Boolean);

  if(addedNewIngredient) await persist('ingredients');
  if(s.editKey){
    const r = state.recipes.find(x=>x.key===s.editKey);
    r.label = label; r.emoji = emoji; r.tagline = tagline; r.shelfLifeDays = shelfLifeDays;
    if(s.image) r.image = s.image;
    r.ingredients = resolved.length ? resolved : r.ingredients;
  } else {
    const finalKey = slugifyRecipeKey(label);
    state.recipes.push({
      key: finalKey, label, emoji, tagline, shelfLifeDays,
      image: s.image || '', ingredients: resolved.length ? resolved : [blankIngredientRow()]
    });
  }
  await persist('recipes');
  closeRecipeModal();
  renderAll();
  showToast(addedNewIngredient ? 'บันทึกสูตรและเพิ่มวัตถุดิบใหม่ในตารางราคาแล้ว (อย่าลืมไปตั้งราคา/หน่วย)' : 'บันทึกสูตรเรียบร้อยแล้ว');
}
function deleteRecipeFromModal(){
  if(!recipeModalState || !recipeModalState.editKey) return;
  state.recipes = state.recipes.filter(r=>r.key!==recipeModalState.editKey);
  persist('recipes').then(()=>{
    closeRecipeModal();
    renderAll();
    showToast('ลบสูตรแล้ว');
  });
}

function attachHandlers(){
  // ปฏิทิน: เมื่อเลือกวันจาก input[type=date] ที่วางทับปุ่ม 📅 ให้ sync ไปช่องข้อความ วว/ดด/ปปปป
  document.querySelectorAll('[data-date-picker]').forEach(picker=>{

function loadScriptOnce(src){
  return new Promise((resolve, reject)=>{
    if(document.querySelector(`script[src="${src}"]`)){
      if(window.ExcelJS) resolve(); else document.querySelector(`script[src="${src}"]`).addEventListener('load', ()=>resolve());
      return;
    }
    const s = document.createElement('script');
    s.src = src;
    s.onload = ()=>resolve();
    s.onerror = ()=>reject(new Error('โหลดไลบรารีสร้างไฟล์ Excel ไม่สำเร็จ'));
    document.head.appendChild(s);
  });
}

const XLSX_BRAND_FILL = { type:'pattern', pattern:'solid', fgColor:{argb:'FFCE6222'} };
const XLSX_SUBHEAD_FILL = { type:'pattern', pattern:'solid', fgColor:{argb:'FFF4EFE4'} };
const XLSX_TOTAL_FILL = { type:'pattern', pattern:'solid', fgColor:{argb:'FFFBF3E7'} };
const MONEY_FMT = '#,##0.00';
const INT_FMT = '#,##0';

function styleHeaderRow(row){
  row.eachCell(cell=>{
    cell.font = {bold:true, color:{argb:'FFFFFFFF'}, size:11};
    cell.fill = XLSX_BRAND_FILL;
    cell.alignment = {vertical:'middle', horizontal:'center', wrapText:true};
    cell.border = {bottom:{style:'thin', color:{argb:'FFDDD3C2'}}};
  });
  row.height = 22;
}
function autoBorder(ws, fromRow, toRow, fromCol, toCol){
  for(let r=fromRow;r<=toRow;r++){
    for(let c=fromCol;c<=toCol;c++){
      const cell = ws.getRow(r).getCell(c);
      cell.border = { top:{style:'hair',color:{argb:'FFEFE6D8'}}, bottom:{style:'hair',color:{argb:'FFEFE6D8'}}, left:{style:'hair',color:{argb:'FFEFE6D8'}}, right:{style:'hair',color:{argb:'FFEFE6D8'}} };
    }
  }
}

async function buildWorkbook(){
  const wb = new ExcelJS.Workbook();
  wb.creator = 'Bluum Business Dashboard';
  wb.created = new Date();

  /* ---------- 1. สรุปภาพรวม ---------- */
  {
    const ws = wb.addWorksheet('สรุปภาพรวม', {views:[{state:'frozen', ySplit:1}]});
    ws.columns = [{header:'รายการ', key:'k', width:38},{header:'ค่า', key:'v', width:26},{header:'หมายเหตุ', key:'n', width:34}];
    styleHeaderRow(ws.getRow(1));

    const s = state.settings;
    const today = todayStr();
    const todayRows = todaysSales();
    const todayBottles = todayRows.reduce((a,r)=>a+Number(r.bottles),0);
    const todayRevenue = todayRows.reduce((a,r)=>a+saleRevenue(r),0);
    const todayCost = todayRows.reduce((a,r)=>a+saleCost(r),0);
    const todayProfit = todayRows.reduce((a,r)=>a+saleProfit(r),0);
    const pctOfTarget = s.targetBottlesPerDay? todayBottles/Number(s.targetBottlesPerDay) : 0;
    const totalCost = totalCostPerBottle();
    const margin = marginLineOA();
    const breakeven = margin>0 ? Math.ceil(Number(s.fixedCostPerDay)/margin) : 0;
    const now = new Date();
    const curMK = monthKey(today);
    const curM = monthlyAgg(curMK);
    const pctGoal = s.monthlyProfitTarget? curM.profit/Number(s.monthlyProfitTarget) : 0;
    const remaining = Math.max(0, Number(s.monthlyProfitTarget) - curM.profit);
    const waste = wasteSummary();
    const cash = cashflowSummary();
    const stock = Number(s.currentStock);
    const stockOK = stock > Number(s.reorderPoint);

    const rows = [
      ['วันที่ส่งออกข้อมูล', fmtDateTH(today), `เวลา ${new Date().toLocaleTimeString('th-TH')}`],
      ['— ยอดขายวันนี้ —', '', ''],
      ['จำนวนขวดวันนี้', todayBottles, 'ขวด'],
      ['รายได้วันนี้', todayRevenue, 'บาท'],
      ['ต้นทุนวันนี้', todayCost, 'บาท'],
      ['กำไรวันนี้', todayProfit, 'บาท'],
      ['% เทียบเป้าหมายวันนี้', pctOfTarget, ''],
      ['— เดือนนี้ —', '', ''],
      [`ยอดขายเดือนนี้ (${thMonthLabel(curMK)})`, curM.bottles, 'ขวด'],
      ['รายได้เดือนนี้', curM.revenue, 'บาท'],
      ['กำไรเดือนนี้', curM.profit, 'บาท'],
      ['เป้าหมายกำไรรายเดือน', Number(s.monthlyProfitTarget), 'บาท'],
      ['% สำเร็จเป้าหมายเดือนนี้', pctGoal, ''],
      ['ขาดอีก (บาท)', remaining, 'บาท'],
      ['— ต้นทุนและจุดคุ้มทุน —', '', ''],
      ['ต้นทุนวัตถุดิบ/ขวด เฉลี่ย', materialCostPerBottleAvg(), 'บาท'],
      ['ต้นทุนรวม/ขวด', totalCost, 'บาท'],
      ['กำไร/ขวด LINE OA', margin, 'บาท'],
      ['จุดคุ้มทุน', breakeven, 'ขวด/วัน'],
      ['— สต๊อก —', '', ''],
      ['สต๊อกคงเหลือ', stock, 'ขวด'],
      ['สถานะสต๊อก', stockOK? 'ปกติ':'ต่ำ ควรสั่งเพิ่ม', ''],
      ['จุดสั่งซื้อขั้นต่ำ', Number(s.reorderPoint), 'ขวด'],
      ['— การผลิตและของเสีย —', '', ''],
      ['ของเสียสะสม', waste.wasteBottles, 'ขวด'],
      ['มูลค่าของเสียสะสม', waste.wasteValue, 'บาท'],
      ['เมนูขายดีที่สุด', waste.bestMenu? waste.bestMenu.label : '-', ''],
      ['— การเงิน —', '', ''],
      ['เงินเข้าเดือนนี้', cash.inflow, 'บาท'],
      ['เงินออกเดือนนี้', cash.outflow, 'บาท'],
      ['กระแสเงินสดสุทธิเดือนนี้', cash.net, 'บาท'],
      ['เงินสดคงเหลือสะสม', cash.cumulative, 'บาท'],
    ];
    rows.forEach(r=>{
      const row = ws.addRow(r);
      if(String(r[0]).startsWith('—')){
        row.eachCell(c=>{ c.font={bold:true, color:{argb:'FF8A5A2A'}}; c.fill=XLSX_SUBHEAD_FILL; });
      } else if(typeof r[1]==='number'){
        const cell = row.getCell(2);
        if(r[2]==='%' || (typeof r[0]==='string' && r[0].includes('%'))) cell.numFmt = '0.0%';
        else if(r[2]==='ขวด' || r[2]==='ขวด/วัน') cell.numFmt = INT_FMT;
        else cell.numFmt = MONEY_FMT;
      }
    });
    autoBorder(ws, 2, ws.rowCount, 1, 3);
  }

  /* ---------- 2. ยอดขาย ---------- */
  {
    const ws = wb.addWorksheet('ยอดขาย', {views:[{state:'frozen', ySplit:1}]});
    ws.columns = [
      {header:'วันที่', key:'date', width:14},
      {header:'ช่องทาง', key:'channel', width:16},
      {header:'จำนวนขวด', key:'bottles', width:13},
      {header:'รายได้ (บาท)', key:'revenue', width:15},
      {header:'กำไร (บาท)', key:'profit', width:15},
    ];
    styleHeaderRow(ws.getRow(1));
    const rows = [...state.salesLog].sort((a,b)=>a.date.localeCompare(b.date));
    let tB=0,tR=0,tP=0;
    rows.forEach(r=>{
      const rev = saleRevenue(r), prof = saleProfit(r);
      tB+=Number(r.bottles); tR+=rev; tP+=prof;
      const row = ws.addRow({date:fmtDateTH(r.date), channel:r.channel, bottles:Number(r.bottles), revenue:rev, profit:prof});
      row.getCell('bottles').numFmt = INT_FMT;
      row.getCell('revenue').numFmt = MONEY_FMT;
      row.getCell('profit').numFmt = MONEY_FMT;
    });
    const totalRow = ws.addRow({date:'รวมทั้งหมด', channel:'', bottles:tB, revenue:tR, profit:tP});
    totalRow.eachCell(c=>{ c.font={bold:true}; c.fill=XLSX_TOTAL_FILL; });
    totalRow.getCell('bottles').numFmt = INT_FMT;
    totalRow.getCell('revenue').numFmt = MONEY_FMT;
    totalRow.getCell('profit').numFmt = MONEY_FMT;
    autoBorder(ws, 2, ws.rowCount, 1, 5);
    if(rows.length===0) ws.addRow(['ยังไม่มีข้อมูล']);
  }

  /* ---------- 3. ค่าใช้จ่าย ---------- */
  {
    const ws = wb.addWorksheet('ค่าใช้จ่าย', {views:[{state:'frozen', ySplit:1}]});
    ws.columns = [
      {header:'วันที่', key:'date', width:14},
      {header:'หมวดหมู่', key:'cat', width:18},
      {header:'รายการ', key:'item', width:32},
      {header:'จำนวนเงิน (บาท)', key:'amount', width:17},
    ];
    styleHeaderRow(ws.getRow(1));
    const rows = [...state.expenseLog].sort((a,b)=>a.date.localeCompare(b.date));
    let tA=0;
    rows.forEach(r=>{
      tA += Number(r.amount);
      const row = ws.addRow({date:fmtDateTH(r.date), cat:r.category, item:r.item||'-', amount:Number(r.amount)});
      row.getCell('amount').numFmt = MONEY_FMT;
    });
    const totalRow = ws.addRow({date:'รวมทั้งหมด', cat:'', item:'', amount:tA});
    totalRow.eachCell(c=>{ c.font={bold:true}; c.fill=XLSX_TOTAL_FILL; });
    totalRow.getCell('amount').numFmt = MONEY_FMT;
    autoBorder(ws, 2, ws.rowCount, 1, 4);
    if(rows.length===0) ws.addRow(['ยังไม่มีข้อมูล']);
  }

  /* ---------- 4. ซื้อวัตถุดิบ ---------- */
  {
    const ws = wb.addWorksheet('ซื้อวัตถุดิบ', {views:[{state:'frozen', ySplit:1}]});
    ws.columns = [
      {header:'วันที่', key:'date', width:14},
      {header:'วัตถุดิบ', key:'ing', width:20},
      {header:'จำนวนที่ซื้อ', key:'qty', width:14},
      {header:'หมายเหตุ', key:'note', width:32},
    ];
    styleHeaderRow(ws.getRow(1));
    const rows = [...state.purchaseLog].sort((a,b)=>a.date.localeCompare(b.date));
    rows.forEach(r=>{
      const row = ws.addRow({date:fmtDateTH(r.date), ing:r.ingredient, qty:Number(r.qty), note:r.note||'-'});
      row.getCell('qty').numFmt = INT_FMT;
    });
    autoBorder(ws, 2, ws.rowCount, 1, 4);
    if(rows.length===0) ws.addRow(['ยังไม่มีข้อมูล']);
  }

  /* ---------- 5. การผลิต ---------- */
  {
    const ws = wb.addWorksheet('การผลิต', {views:[{state:'frozen', ySplit:2}]});
    const headerTop = ['วันที่ผลิต'];
    const headerSub = [''];
    MENUS().forEach(m=>{ headerTop.push(m.label,''); headerSub.push('ผลิต','ขายได้'); });
    headerTop.push('ของเสียรวม (ขวด)'); headerSub.push('');
    ws.addRow(headerTop);
    ws.addRow(headerSub);
    let col=2;
    MENUS().forEach(()=>{ ws.mergeCells(1,col,1,col+1); col+=2; });
    ws.mergeCells(1,1,2,1);
    ws.mergeCells(1, headerTop.length, 2, headerTop.length);
    styleHeaderRow(ws.getRow(1));
    styleHeaderRow(ws.getRow(2));
    ws.getColumn(1).width = 14;
    for(let i=2;i<headerTop.length;i++) ws.getColumn(i).width = 10;
    ws.getColumn(headerTop.length).width = 16;

    const today = todayStr();
    const rows = [...state.productionLog].sort((a,b)=>a.date.localeCompare(b.date));
    rows.forEach(r=>{
      const arr = [fmtDateTH(r.date)];
      let waste = 0;
      MENUS().forEach(m=>{
        const c = r.menus[m.key] || {produced:0, sold:0};
        arr.push(Number(c.produced)||0, Number(c.sold)||0);
        const leftover = (Number(c.produced)||0) - (Number(c.sold)||0);
        const recipe = state.recipes.find(x=>x.key===m.key);
        const shelf = recipe? Number(recipe.shelfLifeDays) : 3;
        if(leftover>0 && daysBetween(r.date, today) > shelf) waste += leftover;
      });
      arr.push(waste);
      const row = ws.addRow(arr);
      row.eachCell(c=> c.numFmt = INT_FMT);
      row.getCell(1).numFmt = undefined;
    });
    autoBorder(ws, 3, ws.rowCount, 1, headerTop.length);
    if(rows.length===0) ws.addRow(['ยังไม่มีข้อมูล']);
  }

  /* ---------- 6. วัตถุดิบ ---------- */
  {
    const ws = wb.addWorksheet('วัตถุดิบ', {views:[{state:'frozen', ySplit:1}]});
    ws.columns = [
      {header:'วัตถุดิบ', key:'name', width:18},
      {header:'หน่วย', key:'unit', width:16},
      {header:'ราคา/หน่วย (บาท)', key:'price', width:16},
      {header:'น้ำหนัก/หน่วย (กก.)', key:'weight', width:17},
      {header:'ใช้/รอบผลิต (50 ขวด)', key:'need', width:18},
      {header:'น้ำหนักที่ต้องซื้อ (กก.)', key:'needW', width:18},
    ];
    styleHeaderRow(ws.getRow(1));
    let totalW = 0;
    state.ingredients.forEach(ing=>{
      const gramsNeeded = ingredientRequiredForBatch(ing.name);
      const gramsPerUnit = Number(ing.weight||0)*1000;
      const need = gramsPerUnit>0 ? gramsNeeded/gramsPerUnit : gramsNeeded;
      const needW = gramsNeeded/1000;
      totalW += needW;
      const row = ws.addRow({name:ing.name, unit:ing.unit, price:Number(ing.price), weight:Number(ing.weight), need:need, needW:needW});
      row.getCell('price').numFmt = MONEY_FMT;
      row.getCell('weight').numFmt = '0.000';
      row.getCell('need').numFmt = '0.0';
      row.getCell('needW').numFmt = '0.00';
    });
    const totalRow = ws.addRow({name:'รวมน้ำหนักที่ต้องซื้อ (1 รอบผลิต)', unit:'', price:'', weight:'', need:'', needW:totalW});
    totalRow.eachCell(c=>{ c.font={bold:true}; c.fill=XLSX_TOTAL_FILL; });
    totalRow.getCell('needW').numFmt = '0.00';
    autoBorder(ws, 2, ws.rowCount, 1, 6);
  }

  /* ---------- 7. สูตรเมนู ---------- */
  {
    const ws = wb.addWorksheet('สูตรเมนู', {views:[{state:'frozen', ySplit:1}]});
    ws.columns = [
      {header:'เมนู', key:'menu', width:14},
      {header:'วัตถุดิบ', key:'ing', width:18},
      {header:'จำนวน/10 ขวด', key:'qty10', width:14},
      {header:'จำนวน/1 ขวด', key:'qty1', width:13},
      {header:'หน่วย', key:'unit', width:12},
      {header:'ต้นทุน (บาท)', key:'cost', width:14},
    ];
    styleHeaderRow(ws.getRow(1));
    state.recipes.forEach(r=>{
      const m = MENUS().find(x=>x.key===r.key);
      let menuCost = 0;
      r.ingredients.forEach(ing=>{
        const pricePerGram = ingredientPricePerGram(ing.name);
        const lineCost = Number(ing.qty)*pricePerGram;
        menuCost += lineCost;
        const row = ws.addRow({menu:`${m.emoji} ${m.label}`, ing:ing.name, qty10:Number(ing.qty), qty1:Number(ing.qty)/10, unit:'กรัม', cost:lineCost});
        row.getCell('qty10').numFmt = INT_FMT;
        row.getCell('qty1').numFmt = '0.00';
        row.getCell('cost').numFmt = MONEY_FMT;
      });
      const subRow = ws.addRow({menu:`รวม ${m.label} (10 ขวด)`, ing:'', qty10:'', qty1:'', unit:'ต้นทุน/ขวด', cost:menuCost});
      subRow.eachCell(c=>{ c.font={bold:true}; c.fill=XLSX_TOTAL_FILL; });
      subRow.getCell('cost').numFmt = MONEY_FMT;
      const perBottleRow = ws.addRow({menu:'', ing:'', qty10:'', qty1:'', unit:'', cost:menuCost/10});
      perBottleRow.getCell('cost').numFmt = MONEY_FMT;
      perBottleRow.getCell('cost').font = {italic:true, color:{argb:'FF8A7B68'}};
    });
    autoBorder(ws, 2, ws.rowCount, 1, 6);

    // grand summary
    ws.addRow([]);
    const grandHeaderRow = ws.addRow(['สรุปรวมทุกเมนู','','','','','']);
    grandHeaderRow.eachCell(c=>{ c.font={bold:true, color:{argb:'FFFFFFFF'}}; c.fill=XLSX_BRAND_FILL; });
    const grandTotal = state.recipes.reduce((s,r)=>s+recipeBatchCost(r.key),0);
    const grow1 = ws.addRow(['รวมต้นทุนวัตถุดิบทั้งหมด (5 เมนู x 10 ขวด = 50 ขวด)','','','','',grandTotal]);
    grow1.getCell(6).numFmt = MONEY_FMT;
    const grow2 = ws.addRow(['ต้นทุนวัตถุดิบ/ขวด เฉลี่ยรวม','','','','',materialCostPerBottleAvg()]);
    grow2.getCell(6).numFmt = MONEY_FMT;
  }

  /* ---------- 8. ตั้งค่า ---------- */
  {
    const ws = wb.addWorksheet('ตั้งค่า', {views:[{state:'frozen', ySplit:1}]});
    ws.columns = [{header:'รายการตั้งค่า', key:'k', width:36},{header:'ค่า', key:'v', width:20}];
    styleHeaderRow(ws.getRow(1));
    const s = state.settings;
    const rows = [
      ['ราคา LINE OA/ขวด (บาท)', s.priceLineOA],
      ['ราคาช่องทางอื่น/ขวด (บาท)', s.priceOther],
      ...state.channels.map(ch=>[`ค่าคอม ${ch.name} (%) — อิงราคา ${ch.priceType==='lineoa'?'LINE OA':'ช่องทางอื่น'}`, Number(ch.commission||0)*100]),
      ['ต้นทุนบรรจุภัณฑ์/ขวด (บาท)', s.packagingCost],
      ['ค่าส่งเฉลี่ย/ขวด (บาท)', s.shippingCost],
      ['ต้นทุนคงที่/วัน (บาท)', s.fixedCostPerDay],
      ['เป้าหมาย (ขวด/วัน)', s.targetBottlesPerDay],
      ['จุดสั่งซื้อขั้นต่ำ (ขวด)', s.reorderPoint],
      ['สำรองสต๊อก (วัน)', s.safetyStockDays],
      ['สต๊อกคงเหลือ (ขวด)', s.currentStock],
      ['เป้าหมายต้นทุนสูงสุด/ขวด (บาท)', s.targetMaxCost],
      ['เป้าหมายกำไรรายเดือน (บาท)', s.monthlyProfitTarget],
    ];
    rows.forEach(r=>{
      const row = ws.addRow(r);
      if(String(r[0]).includes('%')) row.getCell(2).numFmt = '0.0%';
      else row.getCell(2).numFmt = MONEY_FMT;
    });
    autoBorder(ws, 2, ws.rowCount, 1, 2);
  }

  return wb;
}

async function handleExportExcel(){
  const btn = document.getElementById('btnExportExcel');
  const originalText = btn.textContent;
  btn.textContent = 'กำลังสร้างไฟล์...';
  btn.disabled = true;
  try{
    await loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js');
    const wb = await buildWorkbook();
    const buf = await wb.xlsx.writeBuffer();
    const blob = new Blob([buf], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `Bluum_Data_${todayStr()}.xlsx`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('ดาวน์โหลดไฟล์ Excel เรียบร้อย');
  }catch(err){
    console.error(err);
    showToast('สร้างไฟล์ Excel ไม่สำเร็จ ลองใหม่อีกครั้ง');
  }finally{
    btn.textContent = originalText;
    btn.disabled = false;
  }
}
document.getElementById('btnExportExcel').addEventListener('click', handleExportExcel);

/* =========================================================
   AUTHENTICATION
   ========================================================= */
const AUTH_USERS = [
  {email:'bellbellchonthicha@gmail.com', password:'P@ssw0rd'},
  {email:'mahparw_9@hotmail.com', password:'P@ssw0rd'},
];
const SESSION_TIMEOUT_MIN = 30;
let inactivityTimer = null;
let sessionTickTimer = null;
let currentSession = null;

function findUser(email){
  const e = (email||'').trim().toLowerCase();
  return AUTH_USERS.find(u=>u.email.toLowerCase()===e) || null;
}
async function getSession(){
  try{
    const res = await window.storage.get('session', false);
    return res && res.value ? JSON.parse(res.value) : null;
  }catch(e){ return null; }
}
async function saveSession(sess){
  try{ await window.storage.set('session', JSON.stringify(sess), false); }catch(e){}
}
async function clearSessionStorage(){
  try{ await window.storage.delete('session', false); }catch(e){}
}

function showLoginScreen(message){
  document.getElementById('appRoot').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  const errBox = document.getElementById('loginError');
  if(message){ errBox.textContent = message; errBox.style.display='block'; }
  else { errBox.style.display='none'; }
  const passField = document.getElementById('loginPass');
  if(passField) passField.value = '';
  clearTimeout(inactivityTimer);
  clearInterval(sessionTickTimer);
  currentSession = null;
}

function updateSessionBadge(){
  const badge = document.getElementById('sessionBadge');
  if(!badge || !currentSession) return;
  const d = new Date(currentSession.loginAt);
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  badge.textContent = `👤 ${currentSession.email.split('@')[0]} · เข้าระบบ ${hh}:${mm}`;
  badge.title = currentSession.email;
}

function resetInactivityTimer(){
  clearTimeout(inactivityTimer);
  inactivityTimer = setTimeout(async ()=>{
    await clearSessionStorage();
    showLoginScreen(`ระบบออกจากระบบอัตโนมัติ เนื่องจากไม่มีการใช้งานเกิน ${SESSION_TIMEOUT_MIN} นาที`);
  }, SESSION_TIMEOUT_MIN*60*1000);
  if(currentSession){
    currentSession.lastActivity = Date.now();
  }
}
['mousemove','keydown','click','scroll','touchstart'].forEach(evt=>{
  document.addEventListener(evt, ()=>{
    if(currentSession) resetInactivityTimer();
  }, {passive:true});
});

async function showAppScreen(session){
  currentSession = session;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('forgotModal').style.display = 'none';
  document.getElementById('appRoot').style.display = 'block';
  updateSessionBadge();
  resetInactivityTimer();
  clearInterval(sessionTickTimer);
  sessionTickTimer = setInterval(()=>{
    if(currentSession){ saveSession(currentSession); }
  }, 60*1000);
  await bootApp();
}

async function handleLogin(){
  const emailField = document.getElementById('loginUser');
  const passField = document.getElementById('loginPass');
  const errBox = document.getElementById('loginError');
  const user = findUser(emailField.value);
  if(!user || user.password !== passField.value){
    errBox.textContent = 'อีเมลหรือรหัสผ่านไม่ถูกต้อง กรุณาลองใหม่อีกครั้ง';
    errBox.style.display = 'block';
    return;
  }
  errBox.style.display = 'none';
  const session = {email:user.email, loginAt: Date.now(), lastActivity: Date.now()};
  await saveSession(session);
  await showAppScreen(session);
}

async function handleLogout(){
  await clearSessionStorage();
  showLoginScreen();
}

function openForgotModal(){
  document.getElementById('forgotModal').style.display = 'flex';
  document.getElementById('forgotEmail').value = document.getElementById('loginUser').value || '';
  document.getElementById('forgotMsg').style.display = 'none';
}
function closeForgotModal(){
  document.getElementById('forgotModal').style.display = 'none';
}
function handleForgotSend(){
  const email = document.getElementById('forgotEmail').value.trim();
  const msgBox = document.getElementById('forgotMsg');
  const user = findUser(email);
  if(user){
    msgBox.className = 'forgot-success';
    msgBox.textContent = `ส่งลิงก์สำหรับตั้งรหัสผ่านใหม่ไปที่ ${user.email} แล้ว กรุณาตรวจสอบกล่องข้อความอีเมล`;
  } else {
    msgBox.className = 'forgot-fail';
    msgBox.textContent = 'ไม่พบอีเมลนี้ในระบบ กรุณาตรวจสอบอีกครั้ง';
  }
  msgBox.style.display = 'block';
}

document.getElementById('btnLogin').addEventListener('click', handleLogin);
document.getElementById('loginPass').addEventListener('keydown', (e)=>{ if(e.key==='Enter') handleLogin(); });
document.getElementById('loginUser').addEventListener('keydown', (e)=>{ if(e.key==='Enter') handleLogin(); });
document.getElementById('btnLogout').addEventListener('click', handleLogout);
document.getElementById('forgotLink').addEventListener('click', openForgotModal);
document.getElementById('btnForgotCancel').addEventListener('click', closeForgotModal);
document.getElementById('btnForgotSend').addEventListener('click', handleForgotSend);

/* =========================================================
   INIT
   ========================================================= */
async function bootApp(){
  document.getElementById('content').innerHTML = `<div class="empty-state">กำลังโหลดข้อมูล...</div>`;
  await loadState();
  renderAll();
}
async function startup(){
  const session = await getSession();
  if(session && (Date.now() - (session.lastActivity||session.loginAt)) < SESSION_TIMEOUT_MIN*60*1000){
    await showAppScreen(session);
  } else {
    if(session) await clearSessionStorage();
    showLoginScreen();
  }
}
startup();
</script>
